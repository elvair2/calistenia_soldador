<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD do Soldador - V12.3</title>
    <style>
        :root {
            --bg-color: #0d0d0d; --panel-bg: #1a1a1a; --accent-color: #ff8c00;
            --rest-color: #00e5ff; --text-color: #f0f0f0; --muted: #666;
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            user-select: none;
        }
        .hud-container {
            background: var(--panel-bg); width: 90%; max-width: 380px;
            padding: 25px; border-radius: 15px; border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            position: relative;
        }
        .version-tag {
            position: absolute; top: 10px; right: 15px;
            font-size: 0.6rem; color: var(--muted); font-weight: bold;
        }
        .header { font-size: 0.75rem; color: var(--accent-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; }
        .top-menu { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mini-btn { background: #252525; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        
        .image-container { width: 100%; height: 180px; background-color: #222; border-radius: 10px; margin-bottom: 15px; overflow: hidden; border: 2px solid #333; display: flex; justify-content: center; align-items: center; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .timer { font-size: 4.5rem; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', monospace; margin: 10px 0; }
        .bar-bg { width: 100%; height: 10px; background: #111; border-radius: 5px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 0%; background: var(--accent-color); transition: width 1s linear; }
        
        .btn-main { width: 100%; padding: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        #btn-action { background: var(--accent-color); color: #000; border: none; font-size: 1.1rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 1000; flex-direction: column; padding: 30px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .modal input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; margin: 10px 0 20px 0; }
        .modal label { font-size: 0.8rem; color: var(--accent-color); font-weight: bold; }

        .mode-rest .timer { color: var(--rest-color); }
        .mode-rest .bar-fill { background: var(--rest-color); }
    </style>
</head>
<body>

    <audio id="audio-work" loop></audio>
    <audio id="audio-rest" loop></audio>
    <audio id="audio-beep" src="beep.mp3"></audio>

    <div class="hud-container" id="hud">
        <div class="version-tag">V12.3</div>
        <div class="header">STATUS: <span id="status-text">STANDBY</span></div>

        <div class="top-menu">
            <button class="mini-btn" id="open-edit">⚙️ EDITAR</button>
            <button class="mini-btn" onclick="location.reload()">🔄 REFRESH</button>
        </div>

        <div class="image-container"><img id="ex-img" src="1.png" alt="Exercício"></div>
        <h2 id="ex-title">Pronto</h2>
        
        <div style="display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 10px; color: #888;">
            <span>Série: <b id="set-display">1 / 3</b></span>
            <span>Skill: <b id="ex-display">1 / 4</b></span>
        </div>

        <div class="timer" id="timer-display">00:00</div>
        <div class="bar-bg"><div class="bar-fill" id="p-bar"></div></div>

        <button class="btn-main" id="btn-action" onclick="toggleTimer()">INICIAR</button>
        <button class="btn-main" onclick="skip()">PULAR</button>

        <div class="modal" id="modal-config">
            <h2 style="color:var(--accent-color); margin-top:0;">EDITAR MISSÃO</h2>
            <label>TEMPO DE ATAQUE (s)</label>
            <input type="number" id="cfg-time">
            <label>TEMPO DE DESCANSO (s)</label>
            <input type="number" id="cfg-rest">
            <label>SÉRIES POR EXERCÍCIO</label>
            <input type="number" id="cfg-sets">
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" onclick="saveConfig()" style="background:var(--accent-color); color:#000; border:none;">SALVAR</button>
                <button class="btn-main" id="close-edit">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        let settings = { time: 45, rest: 30, sets: 3, musicWork: "ataque.mp3", musicRest: "descanso.mp3" };
        let workoutData = [
            { title: "A Prancha", img: "1.png" }, { title: "Cadeirinha", img: "2.png" },
            { title: "Superman", img: "3.png" }, { title: "Tocha", img: "4.png" }
        ];

        try {
            const saved = localStorage.getItem('soldador_cfg');
            if(saved) settings = JSON.parse(saved);
        } catch(e) {}

        let exIndex = 0, currentSet = 1, isResting = false, timeLeft = 0, totalTime = 0, timerInterval = null, isRunning = false, audioUnlocked = false;
        const audioW = document.getElementById('audio-work'), audioR = document.getElementById('audio-rest'), audioB = document.getElementById('audio-beep');

        function init() { loadExercise(0); }

        function loadExercise(index) {
            clearInterval(timerInterval); isRunning = false;
            exIndex = index; currentSet = 1; isResting = false;
            const ex = workoutData[index];
            document.getElementById('ex-img').src = ex.img;
            document.getElementById('ex-title').innerText = ex.title;
            document.getElementById('ex-display').innerText = `${index + 1} / ${workoutData.length}`;
            setupPhase();
        }

        function setupPhase() {
            timeLeft = isResting ? settings.rest : settings.time;
            totalTime = timeLeft;
            document.getElementById('set-display').innerText = `${currentSet} / ${settings.sets}`;
            document.getElementById('status-text').innerText = isResting ? "REGENERANDO" : "COMBATE";
            document.getElementById('hud').className = isResting ? "hud-container mode-rest" : "hud-container";
            updateDisplay();
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('p-bar').style.width = `${((totalTime - timeLeft) / totalTime) * 100}%`;
        }

        function toggleTimer() {
            if (!audioUnlocked) {
                audioW.src = settings.musicWork; audioR.src = settings.musicRest;
                audioUnlocked = true;
            }
            if (isRunning) {
                clearInterval(timerInterval); isRunning = false;
                audioW.pause(); audioR.pause(); audioB.pause();
                document.getElementById('btn-action').innerText = "RETOMAR";
            } else {
                isRunning = true;
                document.getElementById('btn-action').innerText = "PAUSAR";
                if(isResting) audioR.play().catch(()=>{}); else audioW.play().catch(()=>{});
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    
                    // GATILHO SINCRONIZADO: 7 segundos antes de acabar
                    if (timeLeft === 7) {
                        audioB.currentTime = 0;
                        audioB.play().catch(()=>{});
                    }

                    updateDisplay();
                    if(timeLeft <= 0) handleEnd();
                }, 1000);
            }
        }

        function handleEnd() {
            clearInterval(timerInterval); isRunning = false;
            // PARADA TOTAL DE ÁUDIO NO FIM DA FASE
            audioW.pause(); audioW.currentTime = 0;
            audioR.pause(); audioR.currentTime = 0;
            audioB.pause(); audioB.currentTime = 0;

            if (!isResting) {
                if (currentSet >= settings.sets) {
                    exIndex++; if (exIndex >= workoutData.length) finish(); else loadExercise(exIndex);
                } else { isResting = true; setupPhase(); toggleTimer(); }
            } else { isResting = false; currentSet++; setupPhase(); toggleTimer(); }
        }

        function skip() { 
            clearInterval(timerInterval); 
            audioW.pause(); audioR.pause(); audioB.pause();
            exIndex++; 
            if (exIndex >= workoutData.length) finish(); else loadExercise(exIndex); 
        }

        function finish() { alert("MISSÃO CUMPRIDA!"); loadExercise(0); }

        document.getElementById('open-edit').onclick = function() {
            document.getElementById('cfg-time').value = settings.time;
            document.getElementById('cfg-rest').value = settings.rest;
            document.getElementById('cfg-sets').value = settings.sets;
            document.getElementById('modal-config').style.display = 'flex';
        };

        document.getElementById('close-edit').onclick = function() {
            document.getElementById('modal-config').style.display = 'none';
        };

        function saveConfig() {
            settings.time = parseInt(document.getElementById('cfg-time').value) || 45;
            settings.rest = parseInt(document.getElementById('cfg-rest').value) || 30;
            settings.sets = parseInt(document.getElementById('cfg-sets').value) || 3;
            localStorage.setItem('soldador_cfg', JSON.stringify(settings));
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
