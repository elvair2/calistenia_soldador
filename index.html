<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldier HUD v11.7 - Repair Build</title>
    <style>
        :root {
            --bg-color: #0c0c0c; --panel-bg: #181818; --accent-color: #ff8c00;
            --rest-color: #00e5ff; --text-color: #f0f0f0; --muted: #888;
        }
        body {
            background: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .hud-container {
            background: var(--panel-bg); width: 90%; max-width: 380px;
            padding: 20px; border-radius: 15px; border: 1px solid #333;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.1); text-align: center;
        }
        .header { font-size: 0.75rem; color: var(--accent-color); letter-spacing: 2px; font-weight: bold; margin-bottom: 15px; }
        .mini-btn { background: #252525; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }
        .timer { font-size: 4.5rem; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', monospace; margin: 10px 0; }
        .progress-bar-container { width: 100%; height: 10px; background: #111; border-radius: 5px; border: 1px solid #333; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-color); transition: width 1s linear; }
        .btn-main { width: 100%; padding: 14px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        #btn-action { background: var(--accent-color); color: #000; border: none; }
        
        /* MODAL FIX */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; padding: 30px; box-sizing: border-box; overflow-y: auto; text-align: left; }
        .modal h3 { color: var(--accent-color); margin-top: 0; }
        .modal label { font-size: 0.8rem; color: var(--muted); display: block; margin-top: 15px; }
        .modal input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; margin-top: 5px; }
        
        .mode-rest .timer { color: var(--rest-color); }
        .mode-rest .progress-bar { background: var(--rest-color); }
    </style>
</head>
<body>

    <audio id="audio-work" loop></audio>
    <audio id="audio-rest" loop></audio>
    <audio id="audio-beep"></audio>

    <div class="hud-container" id="hud">
        <div class="header">SYSTEM STATUS: <span id="status-text">STANDBY</span></div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <button class="mini-btn" onclick="openConfig()">⚙️ EDITAR</button>
            <button class="mini-btn" onclick="location.reload()">🔄 RESET</button>
        </div>

        <div class="timer" id="timer-display">00:00</div>
        <div class="progress-bar-container"><div class="progress-bar" id="p-bar"></div></div>

        <button class="btn-main" id="btn-action" onclick="toggleTimer()">INICIAR MISSÃO</button>
        <button class="btn-main" onclick="skip()">PULAR EXERCÍCIO</button>

        <div class="modal" id="modal-config">
            <h3>⚙️ CONFIGURAÇÕES</h3>
            
            <label>TEMPO DE ATAQUE (s)</label>
            <input type="number" id="cfg-time">
            
            <label>TEMPO DE DESCANSO (s)</label>
            <input type="number" id="cfg-rest">

            <label>ÁUDIO DO BEEP (7s ANTES)</label>
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'beep')">
            <button class="mini-btn" style="width:100%; margin-top:5px" onclick="testBeep()">🔊 TESTAR BEEP</button>

            <label>ÁUDIO DE ATAQUE</label>
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'work')">

            <div style="display:flex; gap:10px; margin-top:30px">
                <button class="btn-main" onclick="saveConfig()" style="background: var(--accent-color); color: #000;">SALVAR</button>
                <button class="btn-main" onclick="closeModals()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // Configurações e Memória
        let settings = { time: 45, rest: 30, beep: "beep.mp3", work: "ataque.mp3", restA: "descanso.mp3" };
        try {
            const saved = localStorage.getItem('soldador_cfg');
            if(saved) settings = JSON.parse(saved);
        } catch(e) { console.log("Erro ao carregar memória."); }

        let timeLeft = 0, totalTime = 0, isResting = false, isRunning = false, timerInterval = null, audioUnlocked = false;
        const audioW = document.getElementById('audio-work'), 
              audioR = document.getElementById('audio-rest'), 
              audioB = document.getElementById('audio-beep');

        // Inicialização
        function init() {
            timeLeft = settings.time;
            totalTime = settings.time;
            updateDisplay();
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('p-bar').style.width = `${((totalTime - timeLeft) / totalTime) * 100}%`;
        }

        function toggleTimer() {
            if (!audioUnlocked) {
                audioW.src = settings.work; 
                audioR.src = settings.restA;
                audioB.src = settings.beep;
                audioUnlocked = true;
            }

            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                audioW.pause(); audioR.pause(); audioB.pause();
                document.getElementById('btn-action').innerText = "RETOMAR";
            } else {
                isRunning = true;
                document.getElementById('btn-action').innerText = "PAUSAR";
                if(isResting) audioR.play(); else audioW.play();

                timerInterval = setInterval(() => {
                    timeLeft--;
                    
                    // GATILHO DOS 7 SEGUNDOS
                    if (timeLeft === 7) {
                        audioB.currentTime = 0;
                        audioB.play().catch(e => console.log("Beep bloqueado ou ausente"));
                    }

                    updateDisplay();
                    if (timeLeft <= 0) handlePhaseEnd();
                }, 1000);
            }
        }

        function handlePhaseEnd() {
            clearInterval(timerInterval);
            isRunning = false;
            audioB.pause();
            isResting = !isResting;
            
            timeLeft = isResting ? settings.rest : settings.time;
            totalTime = timeLeft;
            
            document.getElementById('hud').className = isResting ? "hud-container mode-rest" : "hud-container";
            document.getElementById('status-text').innerText = isResting ? "REGENERANDO" : "COMBATE";
            
            toggleTimer(); // Inicia a próxima fase automaticamente
        }

        function skip() {
            clearInterval(timerInterval);
            handlePhaseEnd();
        }

        // --- SISTEMA DE CONFIG (O QUE ESTAVA QUEBRADO) ---
        let tempAudios = {};
        function handleAudioUpload(input, type) {
            const reader = new FileReader();
            reader.onload = (e) => { tempAudios[type] = e.target.result; alert(type + " carregado na memória!"); };
            reader.readAsDataURL(input.files[0]);
        }

        function testBeep() {
            const src = tempAudios.beep || settings.beep;
            audioB.src = src;
            audioB.play();
        }

        function openConfig() {
            document.getElementById('cfg-time').value = settings.time;
            document.getElementById('cfg-rest').value = settings.rest;
            document.getElementById('modal-config').style.display = 'flex';
        }

        function saveConfig() {
            settings.time = parseInt(document.getElementById('cfg-time').value);
            settings.rest = parseInt(document.getElementById('cfg-rest').value);
            if(tempAudios.beep) settings.beep = tempAudios.beep;
            if(tempAudios.work) settings.work = tempAudios.work;
            
            localStorage.setItem('soldador_cfg', JSON.stringify(settings));
            location.reload(); // Recarrega para aplicar tudo limpo
        }

        function closeModals() { document.getElementById('modal-config').style.display = 'none'; }

        window.onload = init;
    </script>
</body>
</html>
