<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldier HUD v12.1 - Full Restore</title>
    <style>
        :root {
            --bg-color: #0c0c0c; --panel-bg: #151515; --accent-color: #ff8c00; /* Laranja Astra SS */
            --rest-color: #00e5ff; --text-color: #f0f0f0; --muted: #666;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-timer: 'Courier New', Courier, monospace; /* Fonte digital */
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main); display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            user-select: none;
        }
        .hud-container {
            background: var(--panel-bg); width: 90%; max-width: 380px;
            padding: 25px; border-radius: 20px; border: 1px solid #222;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
            position: relative; overflow: hidden;
        }
        
        /* TAG DE VERSÃO NO TOPO (v12.0 bug fix) */
        .version-tag {
            position: absolute; top: 12px; right: 20px;
            font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; font-weight: bold;
        }
        
        .header { font-size: 0.7rem; color: var(--accent-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .mini-btn { background: #252525; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; }
        .mini-btn:hover { background: #333; }
        
        .status-badge { display: inline-block; padding: 4px 10px; background: #222; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-bottom: 15px; border: 1px solid #444; }

        h2 { margin: 0 0 5px 0; font-size: 1.4em; }
        
        /* CONTÊINER DE IMAGENS RESTAURADO */
        .image-container { 
            width: 100%; height: 180px; background-color: #2a2a2a; 
            border-radius: 12px; margin-bottom: 15px; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            border: 2px solid #333;
        }
        img { width: 100%; height: 100%; object-fit: cover; }

        .timer { 
            font-size: 4.5rem; font-weight: bold; color: var(--accent-color); 
            font-family: var(--font-timer); margin: 5px 0; 
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.4); /* Brilho Velocímetro */
        }
        .desc { font-size: 0.85em; color: var(--muted); margin-bottom: 15px; min-height: 35px; }

        .bar-bg { width: 100%; height: 10px; background: #111; border-radius: 5px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 0%; background: var(--accent-color); transition: width 1s linear; box-shadow: 0 0 10px var(--accent-color); }
        
        .controls { display: flex; gap: 10px; }
        .btn-main { flex: 1; background: #222; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-action { background: var(--accent-color); color: #000; border: none; font-size: 1.1rem; }

        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100; flex-direction: column; padding: 30px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .modal input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; margin: 10px 0 20px 0; }
        .modal label { font-size: 0.8rem; color: var(--muted); display: block; }
        .config-ex-item { background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }

        .mode-rest .timer { color: var(--rest-color); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        .mode-rest .bar-fill { background: var(--rest-color); box-shadow: 0 0 10px var(--rest-color); }
    </style>
</head>
<body>

    <audio id="audio-work" loop></audio>
    <audio id="audio-rest" loop></audio>
    <audio id="audio-beep"></audio>

    <div class="hud-container" id="hud">
        <div class="version-tag">V12.1</div>
        
        <div class="header">STATUS: <span id="status-text">STANDBY</span></div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <button class="mini-btn" onclick="openConfig()">⚙️ EDITAR</button>
            <button class="mini-btn" onclick="location.reload()">🔄 REFRESH</button>
        </div>
        
        <div class="image-container"><img id="ex-img" src="1.png" alt="Iniciando"></div>

        <h2 id="ex-title">Missão Pronta</h2>
        <div class="desc" id="ex-desc">Aguardando comando...</div>

        <div style="display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 10px;">
            <span>Série: <b id="set-display">1 / 3</b></span>
            <span>Skill: <b id="ex-display">1 / 2</b></span>
        </div>

        <div class="timer" id="timer-display">00:00</div>
        <div class="bar-bg"><div class="bar-fill" id="p-bar"></div></div>

        <div class="controls">
            <button class="btn-main" id="btn-action" onclick="toggleTimer()">INICIAR</button>
            <button class="btn-main" onclick="skip()">PULAR</button>
        </div>

        <div class="modal" id="modal-config">
            <h2 style="color:var(--accent-color)">⚙️ CONFIGURAÇÕES</h2>
            
            <label>TEMPO DE ATAQUE (s)</label>
            <input type="number" id="cfg-time">
            
            <label>TEMPO DE DESCANSO (s)</label>
            <input type="number" id="cfg-rest">

            <label>UPLOAD BEEP (7s ANTES)</label>
            <input type="file" accept="audio/*" onchange="handleAudio(this, 'beep')">

            <label>UPLOAD MÚSICA ATAQUE</label>
            <input type="file" accept="audio/*" onchange="handleAudio(this, 'work')">

            <label>IMAGEM EXERCÍCIO (png)</label>
            <input type="file" accept="image/*" onchange="handleImage(this)">

            <div style="display:flex; gap:10px; margin-top:30px">
                <button class="btn-main" onclick="saveConfig()" style="background:var(--accent-color); color:#000; border:none;">SALVAR</button>
                <button class="btn-main" onclick="closeModals()">FECHAR</button>
            </div>
        </div>
    </div>

    <script>
        // Configurações Base
        let settings = { 
            time: 45, rest: 30, sets: 3,
            work: "ataque.mp3", restA: "descanso.mp3", beep: "beep.mp3"
        };
        let workoutData = [
            { title: "A Prancha (Defesa)", desc: "Mantenha o core firme.", img: "1.png" },
            { title: "Cadeirinha (Wall Sit)", desc: "90 graus na parede.", img: "2.png" }
        ];

        try {
            const saved = localStorage.getItem('soldador_v12_cfg');
            if(saved) settings = JSON.parse(saved);
        } catch(e) {}

        let exIndex = 0, currentSet = 1, isResting = false, timeLeft = 0, totalTime = 0, timerInterval = null, isRunning = false, audioUnlocked = false;
        const audioW = document.getElementById('audio-work'), audioR = document.getElementById('audio-rest'), audioB = document.getElementById('audio-beep');

        // Inicialização
        function init() {
            timeLeft = settings.time;
            totalTime = settings.time;
            loadExercise(0);
        }

        function loadExercise(index) {
            audioB.pause(); audioB.currentTime = 0; // Para o beep imediatamente
            if(index >= workoutData.length) index = 0;
            exIndex = index;
            const ex = workoutData[index];
            document.getElementById('ex-img').src = ex.img;
            document.getElementById('ex-title').innerText = ex.title;
            document.getElementById('ex-desc').innerText = ex.desc;
            document.getElementById('ex-display').innerText = `${index + 1} / ${workoutData.length}`;
            updateDisplay();
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('p-bar').style.width = `${((totalTime - timeLeft) / totalTime) * 100}%`;
        }

        function toggleTimer() {
            if (!audioUnlocked) {
                audioW.src = settings.work; 
                audioR.src = settings.restA;
                audioB.src = settings.beep;
                audioUnlocked = true;
            }

            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                audioW.pause(); audioR.pause(); audioB.pause();
                document.getElementById('btn-action').innerText = "RETOMAR";
            } else {
                isRunning = true;
                document.getElementById('btn-action').innerText = "PAUSAR";
                // Lógica de áudio blindada
                if(isResting) { audioR.play().catch(()=>{}); aW.volume=0; aW.pause(); } 
                else { audioW.play().catch(()=>{}); audioR.volume=0; audioR.pause(); }

                timerInterval = setInterval(() => {
                    timeLeft--;
                    
                    // GATILHO DOS 7 SEGUNDOS
                    if (timeLeft === 7) {
                        audioB.currentTime = 0;
                        audioB.play().catch(()=>{});
                    }

                    updateDisplay();
                    if (timeLeft <= 0) handleEnd();
                }, 1000);
            }
        }

        function handleEnd() {
            clearInterval(timerInterval);
            isRunning = false;
            
            // CORREÇÃO: Força a música a parar AGORA
            audioW.pause(); audioW.currentTime = 0; 
            audioR.pause(); audioR.currentTime = 0;
            audioB.pause(); audioB.currentTime = 0;

            if (!isResting) {
                if (currentSet >= settings.sets) {
                    exIndex++; loadExercise(exIndex);
                } else { isResting = true; setupPhase(); }
            } else { isResting = false; currentSet++; setupPhase(); }
        }

        function setupPhase() {
            timeLeft = isResting ? settings.rest : settings.time;
            totalTime = timeLeft;
            document.getElementById('hud').className = isResting ? "hud-container mode-rest" : "hud-container";
            document.getElementById('status-text').innerText = isResting ? "REGENERANDO" : "COMBATE";
            document.getElementById('set-display').innerText = `${currentSet} / ${settings.sets}`;
            toggleTimer(); // Inicia automático
        }

        function skip() { 
            clearInterval(timerInterval); 
            audioW.pause(); audioW.currentTime = 0; // Força a música a parar AGORA
            audioR.pause(); audioR.currentTime = 0;
            handleEnd(); 
        }

        // --- SISTEMA DE ARQUIVOS (O QUE ESTAVA RATEANDO) ---
        let temp = {};
        function handleAudio(input, type) {
            const reader = new FileReader();
            reader.onload = (e) => { temp[type] = e.target.result; alert(type + " carregado!"); };
            reader.readAsDataURL(input.files[0]);
        }
        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => { temp.img = e.target.result; alert("Imagem carregada!"); };
            reader.readAsDataURL(input.files[0]);
        }

        function openConfig() {
            document.getElementById('cfg-time').value = settings.time;
            document.getElementById('cfg-rest').value = settings.rest;
            document.getElementById('cfg-sets').value = settings.sets;
            document.getElementById('modal-config').style.display = 'flex';
        }

        function saveConfig() {
            settings.time = parseInt(document.getElementById('cfg-time').value);
            settings.rest = parseInt(document.getElementById('cfg-rest').value);
            settings.sets = parseInt(document.getElementById('cfg-sets').value);
            if(temp.beep) settings.beep = temp.beep;
            if(temp.work) settings.work = temp.work;
            if(temp.img) workoutData[0].img = temp.img; // Salva imagem do primeiro exercício
            localStorage.setItem('soldador_v12_cfg', JSON.stringify(settings));
            location.reload();
        }

        function closeModals() { document.getElementById('modal-config').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
