<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD do Soldador - Dynamic Sync Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #ff8c00;
            --rest-color: #00e5ff;
            --text-color: #e0e0e0;
            --muted-text: #a0a0a0;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; user-select: none;
        }

        .hud-container {
            background: var(--panel-bg); width: 90%; max-width: 400px;
            padding: 25px; border-radius: 12px; border: 1px solid #333;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.15); text-align: center;
            position: relative; overflow: hidden;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header { font-size: 0.9em; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .mini-menu { display: flex; gap: 8px; }
        .mini-btn { background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.9em; }

        .status-badge { display: inline-block; padding: 4px 10px; background: #333; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-bottom: 15px; border: 1px solid #555; }

        h2 { margin: 0 0 5px 0; font-size: 1.4em; }
        .desc { font-size: 0.85em; color: var(--muted-text); margin-bottom: 15px; min-height: 35px; }

        .image-container { width: 100%; height: 180px; background-color: #2a2a2a; border-radius: 8px; margin-bottom: 15px; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 2px solid #333; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .timer { font-size: 4em; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 15px rgba(255, 140, 0, 0.4); margin: 5px 0; }

        .progress-bar-container { width: 100%; height: 12px; background-color: #222; border-radius: 6px; border: 1px solid #444; margin: 15px 0 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); transition: width 1s linear; }

        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn-main { flex: 1; background-color: #333; color: var(--text-color); border: 1px solid #555; padding: 12px; border-radius: 6px; font-size: 0.9em; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-action { background-color: var(--accent-color); color: #000; border: none; }

        .mode-rest .timer { color: var(--rest-color); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        .mode-rest .progress-bar { background-color: var(--rest-color); box-shadow: 0 0 10px var(--rest-color); }
        .mode-rest .status-badge { background-color: rgba(0, 229, 255, 0.1); color: var(--rest-color); border-color: var(--rest-color); }

        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); z-index: 10; flex-direction: column; padding: 25px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .modal input { width: 100%; background: #2a2a2a; border: 1px solid #555; color: #fff; padding: 10px; margin-top: 5px; border-radius: 4px; box-sizing: border-box; }
        .config-ex-item { background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="audio-work" loop></audio>
    <audio id="audio-rest" loop></audio>

    <div class="hud-container" id="hud">
        <div class="top-bar">
            <div class="header">Estamina Ocupacional</div>
            <div class="mini-menu">
                <button class="mini-btn" onclick="openStats()">📅 Log</button>
                <button class="mini-btn" onclick="openConfig()">⚙️ Level</button>
            </div>
        </div>
        
        <div class="status-badge" id="status-badge">PRONTO PARA O COMBATE</div>
        <div class="image-container"><img id="ex-img" src="" alt="Referência"></div>

        <h2 id="ex-title">Carregando...</h2>
        <div class="desc" id="ex-desc">...</div>

        <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 10px;">
            <span>Série: <b id="set-display">1 / 3</b></span>
            <span>Skill: <b id="ex-display">1 / 4</b></span>
        </div>

        <div class="timer" id="timer-display">00:00</div>
        <div class="progress-bar-container"><div class="progress-bar" id="p-bar"></div></div>

        <div class="controls">
            <button class="btn-main" id="btn-action" onclick="toggleTimer()">INICIAR</button>
            <button class="btn-main" onclick="skip()">PULAR >></button>
        </div>

        <div class="modal" id="modal-config">
            <h3>⚙️ Configuração de Missão</h3>
            <label>Tempo de Tensão (s)</label><input type="number" id="cfg-time">
            <label>Tempo de Descanso (s)</label><input type="number" id="cfg-rest">
            <label>Séries</label><input type="number" id="cfg-sets">

            <h4>🎵 Gerenciador de Áudio</h4>
            <div style="font-size:0.7em; color:#888; margin-bottom:5px;">Prioridade: Arquivos 'ataque.mp3' e 'descanso.mp3' no GitHub.</div>
            <input type="text" id="cfg-music-work" readonly placeholder="Combate">
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'work')">
            <input type="text" id="cfg-music-rest" readonly placeholder="Descanso">
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'rest')">

            <h4>🖼️ Inventário de Skins (.png)</h4>
            <div id="config-exercises-list"></div>
            <button class="btn-main" style="width:100%; margin-top:10px" onclick="addCustomExercise()">+ ADICIONAR EXERCÍCIO</button>

            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" id="btn-action" onclick="saveConfig()">SALVAR TUDO</button>
                <button class="btn-main" onclick="closeModals()">FECHAR</button>
            </div>
        </div>

        <div class="modal" id="modal-stats">
            <h3>📅 Relatório de Estamina</h3>
            <div id="calendar-log"></div>
            <button class="btn-main" style="width:100%; margin-top:20px" onclick="closeModals()">FECHAR</button>
        </div>
    </div>

    <script>
        let defaultSettings = { 
            time: 45, rest: 30, sets: 3,
            musicWork: "ataque.mp3", 
            musicRest: "descanso.mp3"
        };
        let playerStats = { history: {} };
        let workoutData = [
            { title: "A Prancha (Defesa)", desc: "Mantenha o core firme e respire.", img: "1.png" },
            { title: "Cadeirinha (Wall Sit)", desc: "90 graus na parede. Não suba.", img: "2.png" },
            { title: "Voo do Superman", desc: "Eleve o tronco e pernas. Segure.", img: "3.png" },
            { title: "Estátua da Tocha", desc: "Trave o braço com o peso. Foco.", img: "4.png" }
        ];

        try {
            const s = localStorage.getItem('soldador_cfg'); if(s) defaultSettings = JSON.parse(s);
            const st = localStorage.getItem('soldador_stats'); if(st) playerStats = JSON.parse(st);
            const w = localStorage.getItem('soldador_workout'); if(w) workoutData = JSON.parse(w);
        } catch(e){}

        let exIndex = 0, currentSet = 1, isResting = false, timeLeft = 0, totalTimeForPhase = 0, timerInterval = null, isRunning = false, sessionXP = 0;
        let audioUnlocked = false;
        let fadeInterval = null;
        const audioW = document.getElementById('audio-work');
        const audioR = document.getElementById('audio-rest');

        // MOTOR DE SINCRONIZAÇÃO DINÂMICA
        function applyAudioSync() {
            if (!isRunning) {
                // Fade out total ao pausar o jogo
                fadeToSilence(audioW);
                fadeToSilence(audioR);
                return;
            }

            const activeAudio = isResting ? audioR : audioW;
            const idleAudio = isResting ? audioW : audioR;
            const targetVol = isResting ? 1.0 : 0.4; // Descanso alto, Ataque reduzido

            // Inicia o áudio da fase atual exatamente de onde parou
            activeAudio.play().catch(()=>{});
            
            // Faz o crossfade de volume
            smoothTransition(activeAudio, idleAudio, targetVol);
        }

        function smoothTransition(audioIn, audioOut, targetIn) {
            clearInterval(fadeInterval);
            let step = 0.05;
            fadeInterval = setInterval(() => {
                let finished = true;

                if (audioIn.volume < targetIn) {
                    audioIn.volume = Math.min(targetIn, audioIn.volume + step);
                    finished = false;
                }
                if (audioOut.volume > 0) {
                    audioOut.volume = Math.max(0, audioOut.volume - step);
                    finished = false;
                } else {
                    audioOut.pause(); // Congela a música idle
                }

                if (finished) clearInterval(fadeInterval);
            }, 100);
        }

        function fadeToSilence(audio) {
            let fadeOut = setInterval(() => {
                if (audio.volume > 0.05) {
                    audio.volume -= 0.05;
                } else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(fadeOut);
                }
            }, 50);
        }

        function loadExercise(index) {
            clearInterval(timerInterval); isRunning = false; exIndex = index; currentSet = 1; isResting = false;
            applyAudioSync();
            if(index >= workoutData.length) index = 0;
            const ex = workoutData[index];
            document.getElementById('ex-img').src = ex.img;
            document.getElementById('ex-title').innerText = ex.title;
            document.getElementById('ex-desc').innerText = ex.desc;
            document.getElementById('ex-display').innerText = `${index + 1} / ${workoutData.length}`;
            setupPhase();
            document.getElementById('btn-action').innerText = "INICIAR";
            document.getElementById('status-badge').innerText = "AGUARDANDO";
            document.getElementById('hud').className = "hud-container";
        }

        function setupPhase() {
            document.getElementById('set-display').innerText = `${currentSet} / ${defaultSettings.sets}`;
            if (isResting) {
                timeLeft = defaultSettings.rest; totalTimeForPhase = defaultSettings.rest;
                document.getElementById('status-badge').innerText = "RECUPERANDO ENERGIA";
                document.getElementById('hud').className = "hud-container mode-rest";
            } else {
                timeLeft = defaultSettings.time; totalTimeForPhase = defaultSettings.time;
                document.getElementById('status-badge').innerText = isRunning ? "ATIVO: MANTENHA A POSIÇÃO" : "PRONTO?";
                document.getElementById('hud').className = "hud-container";
            }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('p-bar').style.width = `${((totalTimeForPhase - timeLeft) / totalTimeForPhase) * 100}%`;
        }

        function toggleTimer() {
            if (!audioUnlocked) {
                audioW.src = defaultSettings.musicWork; audioR.src = defaultSettings.musicRest;
                audioW.volume = 0; audioR.volume = 0;
                audioUnlocked = true;
            }

            if (isRunning) {
                clearInterval(timerInterval); isRunning = false;
                document.getElementById('btn-action').innerText = "RETOMAR";
                applyAudioSync();
            } else {
                isRunning = true;
                document.getElementById('btn-action').innerText = "PAUSAR";
                applyAudioSync();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if(!isResting) sessionXP++;
                    updateTimerDisplay();
                    if(timeLeft <= 0) handleEnd();
                }, 1000);
            }
        }

        function handleEnd() {
            clearInterval(timerInterval); isRunning = false;
            if (!isResting) {
                if (currentSet >= defaultSettings.sets) {
                    exIndex++; 
                    if (exIndex >= workoutData.length) finish(); 
                    else loadExercise(exIndex);
                } else { 
                    isResting = true; setupPhase(); toggleTimer(); 
                }
            } else { 
                isResting = false; currentSet++; setupPhase(); toggleTimer(); 
            }
        }

        function finish() {
            let d = new Date().toLocaleDateString('pt-BR');
            playerStats.history[d] = (playerStats.history[d] || 0) + sessionXP;
            localStorage.setItem('soldador_stats', JSON.stringify(playerStats));
            alert("MISSAO CUMPRIDA, SOLDADOR!"); sessionXP = 0; loadExercise(0);
        }

        function skip() { exIndex++; if (exIndex >= workoutData.length) finish(); else loadExercise(exIndex); }

        // --- GESTAO DE ARQUIVOS (SAVES) ---
        let tempImgs = {}, tempAudios = {};
        function handleAudioUpload(input, type) {
            const reader = new FileReader();
            reader.onload = (e) => { tempAudios[type] = e.target.result; document.getElementById(`cfg-music-${type}`).value = "[MEMÓRIA]"; };
            reader.readAsDataURL(input.files[0]);
        }
        function handleImg(input, i) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 400; canvas.height = img.height * (400/img.width);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    tempImgs[i] = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById(`cfg-l-${i}`).value = "[MEMÓRIA]";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function openConfig() {
            document.getElementById('cfg-time').value = defaultSettings.time;
            document.getElementById('cfg-rest').value = defaultSettings.rest;
            document.getElementById('cfg-sets').value = defaultSettings.sets;
            document.getElementById('cfg-music-work').value = defaultSettings.musicWork.length > 50 ? "[MEMÓRIA]" : defaultSettings.musicWork;
            document.getElementById('cfg-music-rest').value = defaultSettings.musicRest.length > 50 ? "[MEMÓRIA]" : defaultSettings.musicRest;
            const list = document.getElementById('config-exercises-list'); list.innerHTML = '';
            workoutData.forEach((ex, i) => {
                list.innerHTML += `<div class="config-ex-item">
                    <b>Exercício ${i+1}: ${ex.title}</b><br>
                    <input type="text" id="cfg-l-${i}" value="${ex.img.length > 100 ? '[MEMÓRIA]' : ex.img}" readonly>
                    <input type="file" accept="image/*" onchange="handleImg(this, ${i})">
                </div>`;
            });
            document.getElementById('modal-config').style.display = 'flex';
        }

        function saveConfig() {
            defaultSettings.time = parseInt(document.getElementById('cfg-time').value);
            defaultSettings.rest = parseInt(document.getElementById('cfg-rest').value);
            defaultSettings.sets = parseInt(document.getElementById('cfg-sets').value);
            if(tempAudios.work) defaultSettings.musicWork = tempAudios.work;
            if(tempAudios.rest) defaultSettings.musicRest = tempAudios.rest;
            workoutData.forEach((ex, i) => { if(tempImgs[i]) ex.img = tempImgs[i]; });
            localStorage.setItem('soldador_cfg', JSON.stringify(defaultSettings));
            localStorage.setItem('soldador_workout', JSON.stringify(workoutData));
            location.reload();
        }

        function addCustomExercise() {
            const t = prompt("Nome do Skill:"); if(t) { workoutData.push({title: t, desc: "Posição customizada", img: "1.png"}); openConfig(); }
        }

        function openStats() {
            const log = document.getElementById('calendar-log'); log.innerHTML = '';
            Object.entries(playerStats.history).sort().reverse().forEach(([d, s]) => {
                log.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333"><span>${d}</span><b>${Math.floor(s/60)} Min de Foco</b></div>`;
            });
            document.getElementById('modal-stats').style.display = 'flex';
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        window.onload = () => loadExercise(0);
    </script>
</body>
</html>
