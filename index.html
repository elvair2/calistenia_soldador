<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD do Soldador - Edit v11.5</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --accent-color: #ff8c00;
            --rest-color: #00e5ff; --text-color: #e0e0e0; --muted-text: #a0a0a0;
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .hud-container {
            background: var(--panel-bg); width: 90%; max-width: 400px;
            padding: 25px; border-radius: 12px; border: 1px solid #333;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.15); text-align: center;
            position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header { font-size: 0.9em; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .mini-btn { background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
        .status-badge { display: inline-block; padding: 4px 10px; background: #333; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-bottom: 15px; border: 1px solid #555; }
        .image-container { width: 100%; height: 180px; background-color: #2a2a2a; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 2px solid #333; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .timer { font-size: 4em; font-weight: bold; color: var(--accent-color); font-family: 'Courier New', monospace; margin: 5px 0; }
        .progress-bar-container { width: 100%; height: 12px; background-color: #222; border-radius: 6px; border: 1px solid #444; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--accent-color); transition: width 1s linear; }
        .controls { display: flex; gap: 10px; }
        .btn-main { flex: 1; background-color: #333; color: var(--text-color); border: 1px solid #555; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #btn-action { background-color: var(--accent-color); color: #000; border: none; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.98); z-index: 10; flex-direction: column; padding: 25px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .modal input { width: 100%; background: #2a2a2a; border: 1px solid #555; color: #fff; padding: 8px; margin-top: 5px; border-radius: 4px; }
        .mode-rest .timer { color: var(--rest-color); }
        .mode-rest .progress-bar { background-color: var(--rest-color); }
    </style>
</head>
<body>

    <audio id="audio-work" loop></audio>
    <audio id="audio-rest" loop></audio>
    <audio id="audio-beep"></audio>

    <div class="hud-container" id="hud">
        <div class="top-bar">
            <div class="header">Estamina Ocupacional</div>
            <div class="mini-menu">
                <button class="mini-btn" onclick="openStats()">📅 Log</button>
                <button class="mini-btn" onclick="openConfig()">⚙️ Edit</button>
            </div>
        </div>
        
        <div class="status-badge" id="status-badge">STANDBY</div>
        <div class="image-container"><img id="ex-img" src="" alt="Referência"></div>

        <h2 id="ex-title">Aguardando...</h2>
        <div id="ex-desc" style="font-size: 0.85em; color: var(--muted-text); margin-bottom: 10px;">---</div>

        <div class="timer" id="timer-display">00:00</div>
        <div class="progress-bar-container"><div class="progress-bar" id="p-bar"></div></div>

        <div class="controls">
            <button class="btn-main" id="btn-action" onclick="toggleTimer()">INICIAR</button>
            <button class="btn-main" onclick="skip()">PULAR</button>
        </div>

        <div class="modal" id="modal-config">
            <h3>⚙️ Configurações</h3>
            <label>Tensão (s)</label><input type="number" id="cfg-time">
            <label>Descanso (s)</label><input type="number" id="cfg-rest">
            <label>Séries</label><input type="number" id="cfg-sets">

            <h4>🎵 Áudios</h4>
            <label>Beep Alerta (7s):</label>
            <input type="text" id="cfg-music-beep" readonly placeholder="beep.mp3">
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'beep')">
            
            <label>Música Trabalho:</label>
            <input type="text" id="cfg-music-work" readonly>
            <input type="file" accept="audio/*" onchange="handleAudioUpload(this, 'work')">

            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" onclick="saveConfig()" style="background: var(--accent-color); color: #000;">SALVAR</button>
                <button class="btn-main" onclick="closeModals()">FECHAR</button>
            </div>
        </div>

        <div class="modal" id="modal-stats">
            <h3>📅 Histórico</h3>
            <div id="calendar-log"></div>
            <button class="btn-main" onclick="closeModals()">FECHAR</button>
        </div>
    </div>

    <script>
        let defaultSettings = { 
            time: 45, rest: 30, sets: 3,
            musicWork: "ataque.mp3", musicRest: "descanso.mp3", musicBeep: "beep.mp3"
        };
        let playerStats = { history: {} };
        let workoutData = [
            { title: "A Prancha (Defesa)", desc: "Mantenha o core firme.", img: "1.png" },
            { title: "Cadeirinha (Wall Sit)", desc: "90 graus na parede.", img: "2.png" }
        ];

        try {
            const s = localStorage.getItem('soldador_cfg'); if(s) defaultSettings = JSON.parse(s);
            const st = localStorage.getItem('soldador_stats'); if(st) playerStats = JSON.parse(st);
        } catch(e){}

        let exIndex = 0, currentSet = 1, isResting = false, timeLeft = 0, totalTimeForPhase = 0, timerInterval = null, isRunning = false;
        let audioUnlocked = false;
        const audioW = document.getElementById('audio-work'), audioR = document.getElementById('audio-rest'), audioB = document.getElementById('audio-beep');

        function loadExercise(index) {
            clearInterval(timerInterval); isRunning = false; 
            audioB.pause(); audioB.currentTime = 0;
            if(index >= workoutData.length) index = 0;
            const ex = workoutData[index];
            document.getElementById('ex-img').src = ex.img;
            document.getElementById('ex-title').innerText = ex.title;
            setupPhase();
            document.getElementById('btn-action').innerText = "INICIAR";
        }

        function setupPhase() {
            if (isResting) {
                timeLeft = defaultSettings.rest; totalTimeForPhase = defaultSettings.rest;
                document.getElementById('status-badge').innerText = "REGENERANDO";
                document.getElementById('hud').className = "hud-container mode-rest";
            } else {
                timeLeft = defaultSettings.time; totalTimeForPhase = defaultSettings.time;
                document.getElementById('status-badge').innerText = "COMBATE";
                document.getElementById('hud').className = "hud-container";
            }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('p-bar').style.width = `${((totalTimeForPhase - timeLeft) / totalTimeForPhase) * 100}%`;
        }

        function toggleTimer() {
            if (!audioUnlocked) {
                audioW.src = defaultSettings.musicWork; audioR.src = defaultSettings.musicRest;
                audioB.src = defaultSettings.musicBeep;
                audioUnlocked = true;
            }

            if (isRunning) {
                clearInterval(timerInterval); isRunning = false;
                document.getElementById('btn-action').innerText = "RETOMAR";
                audioW.pause(); audioR.pause(); audioB.pause();
            } else {
                isRunning = true;
                document.getElementById('btn-action').innerText = "PAUSAR";
                if (isResting) audioR.play(); else audioW.play();
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft === 7) audioB.play().catch(()=>{}); // BEEP 7s ANTES
                    updateTimerDisplay();
                    if(timeLeft <= 0) handleEnd();
                }, 1000);
            }
        }

        function handleEnd() {
            clearInterval(timerInterval); isRunning = false;
            audioB.pause(); audioB.currentTime = 0;
            if (!isResting) {
                if (currentSet >= defaultSettings.sets) {
                    exIndex++; loadExercise(exIndex);
                } else { isResting = true; setupPhase(); toggleTimer(); }
            } else { isResting = false; currentSet++; setupPhase(); toggleTimer(); }
        }

        let tempAudios = {};
        function handleAudioUpload(input, type) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                tempAudios[type] = e.target.result; 
                document.getElementById(`cfg-music-${type}`).value = "[MEMÓRIA]";
            };
            reader.readAsDataURL(input.files[0]);
        }

        function openConfig() {
            document.getElementById('cfg-time').value = defaultSettings.time;
            document.getElementById('cfg-rest').value = defaultSettings.rest;
            document.getElementById('cfg-sets').value = defaultSettings.sets;
            document.getElementById('cfg-music-beep').value = defaultSettings.musicBeep.length > 50 ? "[MEMÓRIA]" : defaultSettings.musicBeep;
            document.getElementById('modal-config').style.display = 'flex';
        }

        function saveConfig() {
            defaultSettings.time = parseInt(document.getElementById('cfg-time').value);
            defaultSettings.rest = parseInt(document.getElementById('cfg-rest').value);
            defaultSettings.sets = parseInt(document.getElementById('cfg-sets').value);
            if(tempAudios.beep) defaultSettings.musicBeep = tempAudios.beep;
            if(tempAudios.work) defaultSettings.musicWork = tempAudios.work;
            localStorage.setItem('soldador_cfg', JSON.stringify(defaultSettings));
            location.reload();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        window.onload = () => loadExercise(0);
    </script>
</body>
</html>
